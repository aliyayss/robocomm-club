<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0d1117"/>
  <!-- Circuit R — bold strokes for legibility at 16-32px -->
  <line x1="7"  y1="6"  x2="7"  y2="26" stroke="#05e8e8" stroke-width="2.5" stroke-linecap="square"/>
  <line x1="7"  y1="6"  x2="19" y2="6"  stroke="#05e8e8" stroke-width="2.5" stroke-linecap="square"/>
  <line x1="19" y1="6"  x2="19" y2="16" stroke="#05e8e8" stroke-width="2.5" stroke-linecap="square"/>
  <line x1="7"  y1="16" x2="19" y2="16" stroke="#05e8e8" stroke-width="2.5" stroke-linecap="square"/>
  <line x1="19" y1="16" x2="24" y2="26" stroke="#05e8e8" stroke-width="2.5" stroke-linecap="square"/>
  <!-- Accent nodes -->
  <circle cx="7"  cy="6"  r="2" fill="#05e8e8"/>
  <circle cx="19" cy="6"  r="2" fill="#05e8e8"/>
  <circle cx="19" cy="16" r="2" fill="#05e8e8"/>
  <circle cx="7"  cy="16" r="2" fill="#05e8e8"/>
</svg>
