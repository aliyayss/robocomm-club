<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="44" height="44" aria-label="RoboComm" role="img">
  <style>
    .bg  { fill: #0d1117; }
    .tr  { fill:none; stroke:#05e8e8; stroke-width:2.5; stroke-linecap:square; stroke-linejoin:miter; }
    .nd  { fill:#05e8e8; }
    .ndp { fill:#05e8e8; animation: ndp 2.4s ease-in-out infinite; }
    .sig { fill:none; stroke:#05e8e8; stroke-width:2.2; stroke-linecap:round; opacity:0; animation: sig 3s ease-out infinite; }
    .fl  { fill:none; stroke:rgba(190,252,255,.9); stroke-width:2.5; stroke-linecap:round; animation: fl 1.8s linear infinite; }
    @keyframes ndp { 0%,100%{ opacity:1; } 50%{ opacity:.3; } }
    @keyframes sig { 0%{ opacity:0; } 20%{ opacity:1; } 80%{ opacity:.5; } 100%{ opacity:0; } }
    @keyframes fl  { from{ stroke-dashoffset:240; } to{ stroke-dashoffset:0; } }
  </style>

  <!-- Background -->
  <rect class="bg" width="100" height="100" rx="14"/>

  <!-- ── Circuit R traces ── -->
  <line class="tr" x1="20" y1="18" x2="20" y2="82"/>
  <line class="tr" x1="20" y1="18" x2="50" y2="18"/>
  <line class="tr" x1="50" y1="18" x2="50" y2="50"/>
  <line class="tr" x1="20" y1="50" x2="50" y2="50"/>
  <polyline class="tr" points="50,50 58,82"/>

  <!-- Small circuit extensions (PCB feel) -->
  <polyline class="tr" points="20,18 10,18 10,10"/>
  <line class="tr" x1="58" y1="82" x2="66" y2="82"/>

  <!-- ── Animated current (white streak over traces) ── -->
  <line class="fl" x1="20" y1="82" x2="20" y2="18" stroke-dasharray="14 200"/>
  <line class="fl" x1="20" y1="18" x2="50" y2="18" stroke-dasharray="10 200" style="animation-delay:.25s"/>
  <line class="fl" x1="50" y1="18" x2="50" y2="50" stroke-dasharray="10 200" style="animation-delay:.5s"/>
  <line class="fl" x1="50" y1="50" x2="20" y2="50" stroke-dasharray="10 200" style="animation-delay:.75s"/>
  <polyline class="fl" points="50,50 58,82" stroke-dasharray="12 200" style="animation-delay:1s"/>

  <!-- ── Nodes ── -->
  <circle class="ndp" cx="20" cy="18" r="3.5"/>
  <circle class="ndp" cx="50" cy="18" r="3.5" style="animation-delay:.6s"/>
  <circle class="ndp" cx="20" cy="50" r="3"   style="animation-delay:1.2s"/>
  <circle class="ndp" cx="50" cy="50" r="3.5" style="animation-delay:.9s"/>
  <circle class="ndp" cx="20" cy="82" r="3"   style="animation-delay:1.8s"/>
  <circle class="ndp" cx="58" cy="82" r="3"   style="animation-delay:1.5s"/>
  <circle class="nd"  cx="10" cy="10" r="2.5"/>
  <circle class="nd"  cx="66" cy="82" r="2"/>

  <!-- ── Signal arcs (communication) ── -->
  <!-- Arcs emanate rightward from bowl center ~(50,34) -->
  <path class="sig" d="M56,26 A10,10 0 0,1 56,42"  style="animation-delay:0s"/>
  <path class="sig" d="M62,18 A18,18 0 0,1 62,50"  style="animation-delay:.9s"/>
  <path class="sig" d="M68,10 A26,26 0 0,1 68,58"  style="animation-delay:1.8s"/>
</svg>
